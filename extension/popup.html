<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 340px;
    max-height: 600px;
    display: flex;
    flex-direction: column;
    background: #141414;
    color: #e8e6e3;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  @keyframes crGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,.5); }
    50% { box-shadow: 0 0 0 4px rgba(46,204,113,0); }
  }

  /* ---------- Header ---------- */
  .header { flex: none; padding: 12px 14px 0; background: #181818; border-bottom: 1px solid #262626; }
  .header-row { display: flex; align-items: center; gap: 8px; }
  .logo { width: 24px; height: 24px; object-fit: contain; flex: none; }
  .title { flex: 1; font-size: 13px; font-weight: 700; letter-spacing: .2px; }
  .status { display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; }
  .status-dot.on { background: #2ecc71; animation: crGlow 2s infinite; }
  .status-label { font-size: 10px; color: #8a8782; }

  .tabs { display: flex; gap: 2px; margin-top: 10px; }
  .tab {
    flex: 1; padding: 8px 0 9px; background: none; border: none;
    border-bottom: 2px solid transparent; color: #8a8782;
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .tab:hover { color: #fff; }
  .tab.active { border-bottom-color: #F47521; color: #fff; }

  /* ---------- Body ---------- */
  .body { flex: 1; overflow-y: auto; }
  .body::-webkit-scrollbar { width: 8px; }
  .body::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 4px; }
  .body::-webkit-scrollbar-track { background: transparent; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ---------- Tab Ahora ---------- */
  .now-wrap { padding: 16px 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  .thumb-wrap { position: relative; display: none; }
  .thumb-wrap.has-img { display: block; }
  .thumb-wrap img { display: block; width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
  .thumb-badge {
    position: absolute; right: 8px; top: 8px; padding: 2px 7px; border-radius: 4px;
    background: rgba(0,0,0,.75); color: #fff; font-size: 10px; font-weight: 600;
    font-variant-numeric: tabular-nums; pointer-events: none;
  }
  .thumb-grad {
    position: absolute; left: 0; right: 0; bottom: 0; height: 76px;
    border-radius: 0 0 8px 8px; pointer-events: none;
    background: linear-gradient(to top, rgba(10,10,10,.92), rgba(10,10,10,0));
  }
  .thumb-titles {
    position: absolute; left: 12px; right: 12px; bottom: 10px;
    display: flex; flex-direction: column; gap: 2px; pointer-events: none;
  }
  .titles-plain { display: none; flex-direction: column; gap: 2px; }
  .titles-plain.show { display: flex; }
  .series-title { font-size: 14px; font-weight: 700; line-height: 1.3; color: #fff; }
  .thumb-titles .series-title { text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  .episode-title { font-size: 11px; color: #c9c5bf; }
  .thumb-titles .episode-title { text-shadow: 0 1px 3px rgba(0,0,0,.6); }

  .progress-block { display: flex; flex-direction: column; gap: 6px; }
  .seek-hit { height: 14px; display: flex; align-items: center; cursor: pointer; }
  .track { position: relative; width: 100%; height: 4px; border-radius: 2px; background: #2c2c2c; }
  .skip-zone {
    position: absolute; top: -2px; bottom: -2px; border-radius: 2px;
    background: rgba(244,117,33,.28); display: none;
  }
  .fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0%; border-radius: 2px; background: #F47521; }
  .knob {
    position: absolute; top: 50%; left: 0%; width: 10px; height: 10px; border-radius: 50%;
    background: #F47521; transform: translate(-50%, -50%);
    box-shadow: 0 0 6px rgba(244,117,33,.6);
  }
  .times {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: #8a8782; font-variant-numeric: tabular-nums;
  }
  .legend { display: none; align-items: center; gap: 5px; font-size: 10px; color: #6d6a66; }
  .legend.show { display: flex; }
  .legend-chip { width: 8px; height: 8px; border-radius: 2px; background: rgba(244,117,33,.28); }

  .next-skip {
    display: none; align-items: center; gap: 7px; padding: 6px 10px;
    border-radius: 6px; background: rgba(244,117,33,.1);
    border: 1px solid rgba(244,117,33,.3); margin-top: -4px;
  }
  .next-skip.show { display: flex; }
  .next-skip .icon { color: #F47521; font-size: 11px; }
  .next-skip .label { font-size: 11px; color: #e8b48f; font-variant-numeric: tabular-nums; }

  .transport { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .transport button {
    height: 44px; border-radius: 8px; border: 1px solid #2c2c2c;
    background: #1d1d1d; color: #e8e6e3; font-size: 15px; cursor: pointer; font-family: inherit;
  }
  .transport button:hover:not(:disabled) { background: #262626; }
  .transport button:disabled { opacity: .35; cursor: default; }
  .transport .txt { font-size: 10px; font-weight: 700; }
  .transport .primary { border: none; background: #F47521; color: #141414; font-size: 16px; }
  .transport .primary:hover { background: #ff8a3d; }
  .transport .accent {
    border-color: rgba(244,117,33,.45); background: rgba(244,117,33,.12);
    color: #F47521; font-size: 10px; font-weight: 700;
  }
  .transport .accent:hover { background: rgba(244,117,33,.22); }
  .no-next-hint { display: none; margin-top: -8px; font-size: 10px; color: #6d6a66; text-align: right; }
  .no-next-hint.show { display: block; }

  .speed-row { display: flex; align-items: center; gap: 8px; }
  .speed-label { font-size: 11px; color: #8a8782; flex: none; }
  .speed-opts { display: flex; gap: 4px; flex: 1; justify-content: flex-end; }
  .speed-opts button {
    padding: 5px 10px; border-radius: 999px; border: 1px solid #2c2c2c;
    background: #1d1d1d; color: #a09c96; font-size: 11px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .speed-opts button.active { border-color: #F47521; background: #F47521; color: #141414; }

  .pip-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px; height: 38px;
    border-radius: 8px; border: 1px solid #2c2c2c; background: #1d1d1d; color: #e8e6e3;
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .pip-btn:hover { background: #262626; }
  .pip-btn.active { background: rgba(244,117,33,.15); color: #F47521; }
  .pip-icon {
    display: inline-block; width: 16px; height: 11px; border: 1.5px solid currentColor;
    border-radius: 2px; position: relative;
  }
  .pip-icon span {
    position: absolute; right: 1px; bottom: 1px; width: 7px; height: 5px;
    background: currentColor; border-radius: 1px;
  }

  .airing {
    display: none; align-items: center; gap: 7px; padding: 6px 10px;
    border-radius: 6px; background: #1a1a1a; border: 1px solid #262626; margin-top: -4px;
  }
  .airing.show { display: flex; }
  .airing .icon { font-size: 11px; }
  .airing .label { font-size: 11px; color: #c9c5bf; font-variant-numeric: tabular-nums; }
  .airing a { color: #F47521; text-decoration: none; margin-left: auto; font-size: 10px; }

  .watched-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px; height: 34px;
    border-radius: 8px; border: 1px solid #2c2c2c; background: #1d1d1d; color: #a09c96;
    font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .watched-btn:hover { background: #262626; color: #e8e6e3; }

  .integr-input {
    width: 100%; box-sizing: border-box; height: 32px; border-radius: 6px;
    border: 1px solid #2c2c2c; background: #1a1a1a; color: #e8e6e3;
    font-size: 11px; padding: 0 10px; font-family: inherit; margin-bottom: 8px;
  }
  .integr-input:focus { outline: none; border-color: #F47521; }
  .integr-note { font-size: 10px; color: #7c7975; line-height: 1.5; margin: 6px 0 8px; word-break: break-all; }
  .integr-note a { color: #F47521; text-decoration: none; }
  .integr-status { font-size: 11px; margin-bottom: 8px; }
  .integr-status.ok { color: #2ecc71; }
  .integr-status.off { color: #8a8782; }

  .empty {
    padding: 52px 28px; display: none; flex-direction: column;
    align-items: center; gap: 12px; text-align: center;
  }
  .empty.show { display: flex; }
  .empty-icon {
    width: 52px; height: 38px; border-radius: 6px; border: 2px solid #333;
    display: flex; align-items: center; justify-content: center; color: #4a4a4a; font-size: 16px;
  }
  .empty-title { font-size: 13px; font-weight: 600; color: #c9c5bf; }
  .empty-sub { font-size: 11px; color: #8a8782; line-height: 1.5; }

  /* ---------- Tab Ajustes ---------- */
  .settings-wrap { padding: 6px 0 14px; }
  .section { padding: 12px 16px 2px; }
  .section-title {
    position: sticky; top: 0; z-index: 2; background: #141414;
    font-size: 10px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
    color: #F47521; padding: 4px 0 6px; border-bottom: 1px solid #232323; margin-bottom: 2px;
  }
  .setting-row {
    display: flex; align-items: center; gap: 12px; padding: 9px 8px; margin: 0 -8px;
    border-radius: 6px; border-bottom: 1px solid #1d1d1d;
  }
  .setting-row:hover { background: #191919; }
  .setting-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .setting-label { font-size: 12px; color: #e8e6e3; }
  .setting-desc { font-size: 10px; color: #7c7975; }

  .switch {
    flex: none; width: 36px; height: 20px; border-radius: 999px; border: none; padding: 0;
    background: #3a3a3a; cursor: pointer; position: relative; transition: background .15s;
  }
  .switch.on { background: #F47521; }
  .switch .knob-s {
    position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%;
    background: #fff; transform: translateX(0); transition: transform .15s;
  }
  .switch.on .knob-s { transform: translateX(16px); }

  .size-opts { display: flex; gap: 3px; flex: none; }
  .size-opts button {
    padding: 4px 8px; border-radius: 6px; border: 1px solid #2c2c2c; background: #1d1d1d;
    color: #a09c96; font-size: 10px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .size-opts button.active {
    border-color: rgba(244,117,33,.5); background: rgba(244,117,33,.15); color: #F47521;
  }

  .config-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .config-actions button {
    height: 36px; border-radius: 8px; border: 1px solid #2c2c2c; background: #1d1d1d;
    color: #e8e6e3; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .config-actions button:hover { background: #262626; }
  .config-actions .danger {
    border-color: rgba(224,73,73,.4); background: rgba(224,73,73,.1); color: #e05656;
  }
  .config-actions .danger:hover { background: rgba(224,73,73,.2); }
  .version { margin-top: 12px; font-size: 10px; color: #6d6a66; text-align: center; }
</style>
</head>
<body>

  <div class="header">
    <div class="header-row">
      <img class="logo" src="icons/logo.png" alt="" />
      <div class="title">Tsuki</div>
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-label" id="statusLabel">Inactivo</span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabNow">Ahora</button>
      <button class="tab" id="tabSettings">Ajustes</button>
    </div>
  </div>

  <div class="body">

    <!-- TAB AHORA -->
    <div class="panel active" id="panelNow">
      <div class="now-wrap" id="dashboard" style="display:none;">

        <div class="thumb-wrap" id="thumbWrap">
          <img id="thumbImg" alt="" />
          <div class="thumb-badge" id="thumbBadge">0:00</div>
          <div class="thumb-grad"></div>
          <div class="thumb-titles">
            <div class="series-title" id="seriesTitle">—</div>
            <div class="episode-title" id="episodeTitle">—</div>
          </div>
        </div>
        <div class="titles-plain" id="titlesPlain">
          <div class="series-title" id="seriesTitlePlain">—</div>
          <div class="episode-title" id="episodeTitlePlain">—</div>
        </div>

        <div class="progress-block">
          <div class="seek-hit" id="seekHit">
            <div class="track">
              <div class="skip-zone" id="zoneIntro" title="Intro (auto-skip)"></div>
              <div class="skip-zone" id="zoneRecap" title="Recap (auto-skip)"></div>
              <div class="skip-zone" id="zoneCredits" title="Ending (auto-skip)"></div>
              <div class="fill" id="fill"></div>
              <div class="knob" id="knob"></div>
            </div>
          </div>
          <div class="times">
            <span id="curTime">0:00</span>
            <span class="legend" id="legend"><span class="legend-chip"></span><span id="legendText">zonas de auto-skip</span></span>
            <span id="durTime">0:00</span>
          </div>
        </div>

        <div class="next-skip" id="nextSkip">
          <span class="icon">⏭</span>
          <span class="label" id="nextSkipLabel"></span>
        </div>

        <div class="airing" id="airing">
          <span class="icon">📅</span>
          <span class="label" id="airingLabel"></span>
          <a id="airingLink" href="#" target="_blank">AniList ↗</a>
        </div>

        <div class="transport">
          <button id="prevEp" title="Episodio anterior">⏮</button>
          <button id="back10" class="txt" title="−10 segundos">−10s</button>
          <button id="playPause" class="primary" title="Play / Pausa">⏯</button>
          <button id="fwd10" class="txt" title="+10 segundos">+10s</button>
          <button id="fwd90" class="accent" title="+90s (saltar opening)">+90s</button>
          <button id="nextEp" title="Episodio siguiente">⏭</button>
        </div>
        <div class="no-next-hint" id="noNextHint">Último episodio disponible</div>

        <div class="speed-row">
          <span class="speed-label" id="speedLabel">Velocidad</span>
          <div class="speed-opts" id="speedOpts">
            <button data-rate="1">1x</button>
            <button data-rate="1.25">1.25x</button>
            <button data-rate="1.5">1.5x</button>
            <button data-rate="2">2x</button>
          </div>
        </div>

        <button class="pip-btn" id="pipBtn">
          <span class="pip-icon"><span></span></span>
          <span id="pipLabel">Picture-in-Picture</span>
        </button>

        <button class="watched-btn" id="markWatched" title="Salta a los últimos segundos para que Crunchyroll lo registre como visto">
          ✓ Marcar episodio como visto
        </button>
      </div>

      <div class="empty show" id="empty">
        <div class="empty-icon">▶</div>
        <div class="empty-title" id="emptyTitle">No hay un episodio reproduciéndose</div>
        <div class="empty-sub" id="emptySub">Abre un episodio en Crunchyroll y los controles aparecerán aquí.</div>
      </div>
    </div>

    <!-- TAB AJUSTES -->
    <div class="panel" id="panelSettings">
      <div class="settings-wrap" id="settingsWrap"></div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
